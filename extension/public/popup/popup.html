<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AcessLens</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 240px;
        padding: 16px;
        margin: 0;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 8px;
      }
      p {
        font-size: 13px;
        color: #444;
        margin: 0 0 12px;
      }
      button {
        width: 100%;
        padding: 8px;
        font-size: 13px;
        border-radius: 6px;
        border: 1px solid #ccc;
        background: #f5f5f5;
        cursor: pointer;
        margin-bottom: 8px;
      }
      button:hover {
        background: #eee;
      }
      #status {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      #status.on {
        color: #16a34a;
      }
      #status.off {
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <h1>AcessLens Gaze Reader</h1>
    <p id="status" class="off">Checking status…</p>
    <button id="recalibrate">Recalibrate</button>
    <p style="font-size: 11px; color: #888;">
      Use the toolbar icon to turn tracking on/off for this tab.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
